<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLCES Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   CSS VARIABLES — light / dark
══════════════════════════════════════════ */
:root {
  --bg:       #f5f5f5;
  --surface:  #ffffff;
  --surface2: #f0f0f0;
  --surface3: #e4e4e4;
  --border:   #e0e0e0;
  --text:     #111111;
  --text2:    #555555;
  --text3:    #999999;
  --accent:   #FF3A00;
  --orange:   #FF6A2A;
  --green:    #27AE60;
  --blue:     #1E90FF;
  --sidebar-w: 260px;
  --top-h:    54px;
}
[data-theme="dark"] {
  --bg:       #0e0e0e;
  --surface:  #1a1a1a;
  --surface2: #242424;
  --surface3: #2e2e2e;
  --border:   #333333;
  --text:     #f0f0f0;
  --text2:    #aaaaaa;
  --text3:    #666666;
}

/* ══════════════════════════════════════════
   RESET + BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; padding: 0; }
h1,h2,h3,h4,p { margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  transition: background 200ms, color 200ms;
}

input, select, textarea, button {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--top-h);
  background: var(--text);
  color: var(--bg);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 12px;
  z-index: 200;
  border-bottom: 2px solid var(--accent);
}

.topbar-brand {
  font-weight: 900;
  font-style: italic;
  font-size: 1.15rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  flex: 1;
}
.topbar-brand span { color: var(--accent); }

.topbar-actions { display: flex; align-items: center; gap: 10px; }

/* Status pill */
.ws-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; opacity: 0.75;
}
.ws-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #666; transition: background 300ms;
}
.ws-dot.live  { background: var(--green); box-shadow: 0 0 0 3px rgba(39,174,96,.3); }
.ws-dot.error { background: var(--accent); }

/* Dark mode toggle */
.theme-toggle {
  background: var(--surface3);
  border: none; cursor: pointer;
  width: 36px; height: 20px;
  border-radius: 10px;
  position: relative;
  transition: background 200ms;
  flex-shrink: 0;
}
.theme-toggle::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  background: var(--text);
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: transform 200ms, background 200ms;
}
[data-theme="dark"] .theme-toggle::after { transform: translateX(16px); }

/* Top action buttons */
.top-btn {
  padding: 6px 14px;
  font-weight: 700; font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: 0.07em;
  border: none; border-radius: 4px; cursor: pointer;
  transition: opacity 120ms, transform 80ms;
  white-space: nowrap;
}
.top-btn:hover  { opacity: 0.85; }
.top-btn:active { transform: scale(0.96); }
.top-btn.primary { background: var(--accent); color: white; }
.top-btn.ghost   { background: rgba(255,255,255,.12); color: var(--bg); }
.top-btn.success { background: var(--green) !important; }
.top-btn.fail    { background: #c0392b !important; }

/* Sidebar */
.sidebar {
  position: fixed;
  top: var(--top-h); left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 100;
  display: flex;
  flex-direction: column;
}

/* Main */
.main {
  margin-top: var(--top-h);
  margin-left: var(--sidebar-w);
  min-height: calc(100vh - var(--top-h));
  padding: 24px 24px 80px;
  max-width: 860px;
}

/* ══════════════════════════════════════════
   SIDEBAR COMPONENTS
══════════════════════════════════════════ */
.sb-section {
  border-bottom: 1px solid var(--border);
  padding: 0;
}

.sb-label {
  font-size: 0.65rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--text3);
  padding: 14px 16px 6px;
}

.sb-event-card {
  padding: 10px 14px;
  background: var(--surface2);
  margin: 4px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
}

.sb-event-name {
  font-weight: 900; font-style: italic;
  font-size: 1rem; text-transform: uppercase;
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
}

.sb-event-meta {
  font-size: 0.72rem; color: var(--text3);
  margin-top: 2px;
}

.sb-day-list { padding: 4px 0 8px; }

.sb-day {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 16px;
  cursor: pointer;
  font-weight: 700; font-size: 0.8rem;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--text2);
  border-left: 3px solid transparent;
  transition: background 120ms, color 120ms, border-color 120ms;
}
.sb-day:hover { background: var(--surface2); color: var(--text); }
.sb-day.active {
  background: var(--surface2);
  color: var(--accent);
  border-left-color: var(--accent);
}
.sb-day-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 120ms; }
.sb-day:hover .sb-day-actions { opacity: 1; }

.sb-add-btn {
  margin: 4px 8px 8px;
  width: calc(100% - 16px);
  padding: 7px;
  background: none;
  border: 1px dashed var(--border);
  border-radius: 5px;
  color: var(--text3);
  font-size: 0.75rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 120ms, color 120ms, border-color 120ms;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.sb-add-btn:hover {
  background: var(--surface2);
  color: var(--accent);
  border-color: var(--accent);
}

/* ══════════════════════════════════════════
   MAIN AREA — DAY HEADER
══════════════════════════════════════════ */
.day-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  background: var(--surface);
  border-radius: 8px;
  padding: 18px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}
.day-header-full { grid-column: 1 / -1; }

.field-label {
  font-size: 0.65rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text3); margin-bottom: 5px;
}

.field-input {
  width: 100%; padding: 9px 11px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 5px; color: var(--text);
  font-size: 0.85rem; font-weight: 600;
  outline: none;
  transition: border-color 150ms, background 150ms;
}
.field-input:focus {
  border-color: var(--accent);
  background: var(--surface);
}
.field-input.title-input {
  font-style: italic; font-weight: 900; font-size: 1.05rem;
  text-transform: uppercase;
}

select.field-input { cursor: pointer; }

/* ══════════════════════════════════════════
   SECTION HEADING (Games, Breaks)
══════════════════════════════════════════ */
.section-heading {
  display: flex; align-items: center; justify-content: space-between;
  margin: 24px 0 10px;
}
.section-title {
  font-size: 0.68rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3);
}
.add-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 4px; color: var(--text2);
  font-size: 0.72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  cursor: pointer;
  transition: border-color 120ms, color 120ms, background 120ms;
}
.add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
.add-btn.break { border-style: dashed; }

/* ══════════════════════════════════════════
   GAME CARD
══════════════════════════════════════════ */
.game-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 200ms;
}
.game-card:hover { border-color: var(--text3); }
.game-card.is-break { border-style: solid; border-color: #444; }
.game-card.is-break .card-bar { background: #333; }

.card-bar {
  display: flex; align-items: center;
  padding: 10px 14px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.card-bar-title {
  font-weight: 900; font-style: italic;
  font-size: 0.95rem; text-transform: uppercase;
  flex: 1; color: var(--text);
  min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card-bar.is-break .card-bar-title { color: white; }
.card-time {
  font-size: 0.72rem; font-weight: 700; color: var(--text3);
  flex-shrink: 0;
}
.card-bar.is-break .card-time { color: rgba(255,255,255,0.6); }

/* Tags on card bar */
.ctag {
  font-size: 0.62rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 2px 7px; border-radius: 3px;
  flex-shrink: 0;
}
.ctag.junior  { background: #e8f4fd; color: #1E90FF; }
.ctag.senior  { background: #fdeee8; color: #FF6A2A; }
.ctag.versus  { background: var(--text); color: var(--bg); }
.ctag.rrobin  { background: #27AE60; color: white; }
.ctag.mid     { background: var(--surface3); color: var(--text3); font-style: italic; }
.ctag.brk     { background: #555; color: white; }

/* Card icon buttons */
.icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text3); padding: 3px 5px;
  border-radius: 3px; font-size: 1rem; line-height: 1;
  transition: color 120ms, background 120ms;
  flex-shrink: 0;
}
.icon-btn:hover { color: var(--text); background: var(--surface3); }
.icon-btn.del:hover { color: var(--accent); }
.icon-btn.arrow { font-size: 0.8rem; }

/* Expand chevron */
.card-chevron {
  font-size: 0.7rem; color: var(--text3); flex-shrink: 0;
  transition: transform 200ms;
}
.card-chevron.open { transform: rotate(180deg); }

/* Card body */
.card-body {
  display: none;
  padding: 16px;
  border-top: 1px solid var(--border);
  flex-direction: column;
  gap: 14px;
}
.card-body.open { display: flex; }

/* Form grid inside card */
.form-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
}
.form-group { display: flex; flex-direction: column; }

/* Toggle switch */
.toggle-row {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap;
}
.toggle-label {
  font-size: 0.72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em; color: var(--text2);
}
.toggle-wrap {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
}
.toggle {
  width: 38px; height: 22px; border-radius: 11px;
  background: var(--surface3); border: none; cursor: pointer;
  position: relative; flex-shrink: 0; transition: background 200ms;
}
.toggle::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px; background: var(--text2);
  border-radius: 50%; top: 3px; left: 3px;
  transition: transform 200ms, background 200ms;
}
.toggle.on { background: var(--accent); }
.toggle.on::after { transform: translateX(16px); background: white; }
.toggle-text { font-size: 0.75rem; font-weight: 700; color: var(--text2); }

/* Delegate tags */
.delegates-wrap {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  padding: 8px 10px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 5px; min-height: 40px;
  cursor: text;
}
.delegates-wrap:focus-within { border-color: var(--accent); background: var(--surface); }
.delegate-tag {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface3); border-radius: 4px;
  padding: 3px 8px; font-size: 0.78rem; font-weight: 600; color: var(--text);
}
.delegate-tag button {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 0.9rem; line-height: 1; padding: 0;
}
.delegate-tag button:hover { color: var(--accent); }
.delegate-input {
  border: none; background: none; outline: none;
  font-size: 0.78rem; font-weight: 600; color: var(--text);
  flex: 1; min-width: 120px; padding: 2px 0;
}
.delegate-input::placeholder { color: var(--text3); font-weight: 400; }

/* Score type selector */
.scoretype-picker {
  display: flex; gap: 6px;
}
.scoretype-opt {
  flex: 1; padding: 8px 6px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 5px; text-align: center;
  font-size: 0.72rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text2); cursor: pointer;
  transition: border-color 150ms, color 150ms, background 150ms;
}
.scoretype-opt.active {
  border-color: var(--accent); color: var(--accent);
  background: var(--surface);
}

/* Scoring rows */
.scoring-table { display: flex; flex-direction: column; gap: 6px; }
.scoring-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border-radius: 5px;
  padding: 8px 10px;
}
.sr-num {
  font-size: 0.65rem; font-weight: 800; color: var(--text3);
  width: 18px; flex-shrink: 0; text-align: center;
}
.sr-input {
  flex: 1; padding: 6px 8px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 4px; color: var(--text); outline: none;
  font-weight: 700; font-size: 0.82rem; text-transform: uppercase;
  transition: border-color 150ms;
}
.sr-input:focus { border-color: var(--accent); }
.sr-score {
  width: 60px; text-align: center; font-style: italic; font-weight: 900;
  font-size: 1rem;
}
.sr-vs {
  font-size: 0.7rem; font-weight: 800; color: var(--text3);
  flex-shrink: 0;
}
.scoring-add {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px; background: none;
  border: 1.5px dashed var(--border); border-radius: 5px;
  color: var(--text3); font-size: 0.72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  cursor: pointer; transition: border-color 120ms, color 120ms;
  width: 100%;
}
.scoring-add:hover { border-color: var(--accent); color: var(--accent); }

/* Broadcast bar */
.broadcast-bar {
  position: fixed; bottom: 0; left: var(--sidebar-w); right: 0;
  background: var(--surface);
  border-top: 1.5px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; gap: 12px;
  z-index: 150;
}
.bc-dirty {
  font-size: 0.72rem; font-weight: 700; color: var(--text3);
  flex: 1;
}
.bc-dirty.unsaved { color: var(--orange); }
.broadcast-btn {
  padding: 10px 24px;
  background: var(--accent); color: white;
  border: none; border-radius: 5px; cursor: pointer;
  font-weight: 900; font-size: 0.78rem; font-style: italic;
  text-transform: uppercase; letter-spacing: 0.08em;
  transition: background 150ms, transform 80ms;
}
.broadcast-btn:hover  { background: #d62f00; }
.broadcast-btn:active { transform: scale(0.97); }
.broadcast-btn.success { background: var(--green); }
.broadcast-btn.fail    { background: #c0392b; }

/* ══════════════════════════════════════════
   EVENT EDITOR (modal-like overlay)
══════════════════════════════════════════ */
.event-editor {
  padding: 10px 8px 4px;
}
.event-editor .form-row { margin-bottom: 8px; }

/* ══════════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════════ */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text3); font-style: italic; font-size: 0.9rem;
}

/* ══════════════════════════════════════════
   RESPONSIVE — collapse sidebar on small screens
══════════════════════════════════════════ */
@media (max-width: 700px) {
  :root { --sidebar-w: 0px; }
  .sidebar { display: none; }
  .main, .broadcast-bar { margin-left: 0; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ══ TOPBAR ══ -->
<div class="topbar">
  <div class="topbar-brand">PLCES <span>ADMIN</span></div>
  <div class="topbar-actions">
    <div class="ws-status">
      <div class="ws-dot" id="ws-dot"></div>
      <span id="ws-label">connecting</span>
    </div>
    <button class="theme-toggle" id="theme-btn" title="Toggle dark mode"></button>
    <button class="top-btn ghost" id="reload-btn">↺ Reload</button>
    <button class="top-btn primary" id="save-btn">▲ Save & Broadcast</button>
  </div>
</div>

<!-- ══ SIDEBAR ══ -->
<div class="sidebar" id="sidebar"></div>

<!-- ══ MAIN ══ -->
<div class="main" id="main">
  <div class="empty-state" id="empty">Loading data…</div>
</div>

<!-- ══ BROADCAST BAR ══ -->
<div class="broadcast-bar">
  <div class="bc-dirty" id="dirty-label">All changes saved</div>
  <button class="broadcast-btn" id="bc-btn">Save & Broadcast</button>
</div>

<script>
// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
var state        = null;   // full PLCES data object
var isDirty      = false;
var activeEvent  = null;
var activeDayIdx = 0;
var ws           = null;

// ══════════════════════════════════════════════════════
//  DARK MODE
// ══════════════════════════════════════════════════════
var html = document.documentElement;
var savedTheme = localStorage.getItem('plces-theme') || 'light';
html.setAttribute('data-theme', savedTheme);

document.getElementById('theme-btn').addEventListener('click', function() {
  var t = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', t);
  localStorage.setItem('plces-theme', t);
});

// ══════════════════════════════════════════════════════
//  WEBSOCKET
// ══════════════════════════════════════════════════════
function connectWS() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  try {
    ws = new WebSocket(proto + '//' + location.host + '/ws');
    ws.onopen    = function() { setWSStatus('live', 'live'); };
    ws.onclose   = function() { setWSStatus('error', 'disconnected'); setTimeout(connectWS, 3000); };
    ws.onerror   = function() { setWSStatus('error', 'error'); };
    ws.onmessage = function(ev) {
      try {
        var msg = JSON.parse(ev.data);
        // Only accept external data_update when we have no local state yet
        if (msg.type === 'data_update' && msg.data && !state) {
          state = stripMeta(msg.data);
          renderAll();
        }
      } catch(e) {}
    };
  } catch(e) {}
}

function setWSStatus(cls, text) {
  var dot  = document.getElementById('ws-dot');
  var lbl  = document.getElementById('ws-label');
  dot.className = 'ws-dot ' + cls;
  lbl.textContent = text;
}

// ══════════════════════════════════════════════════════
//  DATA LOAD / SAVE
// ══════════════════════════════════════════════════════
function loadData() {
  fetch('/api/data')
    .then(function(r) { return r.json(); })
    .then(function(res) {
      state = stripMeta(res.data || {});
      isDirty = false;
      renderAll();
    })
    .catch(function() { setWSStatus('error', 'fetch error'); });
}

function stripMeta(d) {
  var c = JSON.parse(JSON.stringify(d));
  delete c._updated_at;
  return c;
}

function markDirty() {
  isDirty = true;
  var lbl = document.getElementById('dirty-label');
  lbl.textContent = 'Unsaved changes — remember to broadcast!';
  lbl.className = 'bc-dirty unsaved';
}

function markClean() {
  isDirty = false;
  var lbl = document.getElementById('dirty-label');
  lbl.textContent = 'All changes saved ✓';
  lbl.className = 'bc-dirty';
}

function saveAndBroadcast(btn) {
  if (!state) return;
  btn.textContent = 'Saving…';
  btn.disabled = true;
  fetch('/api/data', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ data: state })
  })
  .then(function(r) { return r.json(); })
  .then(function() {
    btn.classList.add('success');
    btn.textContent = 'Saved ✓';
    markClean();
    setTimeout(function() {
      btn.classList.remove('success');
      btn.textContent = btn.id === 'save-btn' ? '▲ Save & Broadcast' : 'Save & Broadcast';
      btn.disabled = false;
    }, 2000);
  })
  .catch(function() {
    btn.classList.add('fail');
    btn.textContent = 'Error — Retry';
    setTimeout(function() {
      btn.classList.remove('fail');
      btn.textContent = btn.id === 'save-btn' ? '▲ Save & Broadcast' : 'Save & Broadcast';
      btn.disabled = false;
    }, 2500);
  });
}

document.getElementById('save-btn').addEventListener('click', function() {
  saveAndBroadcast(this);
});
document.getElementById('bc-btn').addEventListener('click', function() {
  saveAndBroadcast(this);
});
document.getElementById('reload-btn').addEventListener('click', function() {
  if (isDirty && !confirm('You have unsaved changes. Reload from server?')) return;
  state = null;
  loadData();
});

// ══════════════════════════════════════════════════════
//  RENDER ALL
// ══════════════════════════════════════════════════════
function renderAll() {
  if (!state) return;
  var keys = Object.keys(state);
  if (keys.length === 0) {
    // No events yet — show prompt
    document.getElementById('main').innerHTML =
      '<div class="empty-state">No events yet. Add one below.</div>';
    renderSidebar();
    return;
  }
  if (!activeEvent || !state[activeEvent]) activeEvent = keys[0];
  renderSidebar();
  renderDay();
}

// ══════════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════════
function renderSidebar() {
  var sb = document.getElementById('sidebar');
  sb.innerHTML = '';

  // ── Events ──
  Object.entries(state).forEach(function(entry) {
    var evId = entry[0];
    var ev   = entry[1];

    var sec = el('div', 'sb-section');
    var lbl = el('div', 'sb-label');
    lbl.textContent = 'EVENT';
    sec.appendChild(lbl);

    // Event editor card
    var eCard = el('div', 'sb-event-card');

    var nameRow = el('div', 'sb-event-name');
    var nameSpan = el('span');
    nameSpan.textContent = up(ev.name || evId);
    var delEvBtn = iconBtn('✕', 'del', function() {
      if (!confirm('Delete event "' + (ev.name||evId) + '" and all its days?')) return;
      delete state[evId];
      if (activeEvent === evId) activeEvent = Object.keys(state)[0] || null;
      markDirty(); renderAll();
    });
    nameRow.appendChild(nameSpan);
    nameRow.appendChild(delEvBtn);
    eCard.appendChild(nameRow);

    var meta = el('div', 'sb-event-meta');
    meta.textContent = baseLabel(ev.base) + ' · ' + (ev.startdate || '') + (ev.enddate ? ' → ' + ev.enddate : '');
    eCard.appendChild(meta);

    // Inline event editor fields
    var editor = el('div', 'event-editor');

    // Name
    var g1 = formGroup('Name');
    var inp1 = fieldInput(ev.name || '', 'text', true);
    inp1.addEventListener('input', function() {
      state[evId].name = inp1.value;
      nameSpan.textContent = up(inp1.value || evId);
      meta.textContent = baseLabel(state[evId].base) + ' · ' + (state[evId].startdate||'') + (state[evId].enddate ? ' → '+state[evId].enddate : '');
      markDirty();
    });
    g1.appendChild(inp1); editor.appendChild(g1);

    // Base + dates row
    var row1 = el('div', 'form-row');
    var g2 = formGroup('Type');
    var sel = document.createElement('select');
    sel.className = 'field-input';
    ['house','grade'].forEach(function(v) {
      var o = document.createElement('option');
      o.value = v; o.textContent = baseLabel(v);
      if (ev.base === v) o.selected = true;
      sel.appendChild(o);
    });
    sel.addEventListener('change', function() { state[evId].base = sel.value; meta.textContent = baseLabel(sel.value) + ' · ' + (state[evId].startdate||'') + (state[evId].enddate ? ' → '+state[evId].enddate : ''); markDirty(); });
    g2.appendChild(sel); row1.appendChild(g2);

    var g3 = formGroup('Start date');
    var inp3 = fieldInput(ev.startdate || '', 'text');
    inp3.placeholder = 'May 4, 2026';
    inp3.addEventListener('input', function() { state[evId].startdate = inp3.value; markDirty(); });
    g3.appendChild(inp3); row1.appendChild(g3);

    var g4 = formGroup('End date');
    var inp4 = fieldInput(ev.enddate || '', 'text');
    inp4.placeholder = 'Optional';
    inp4.addEventListener('input', function() { state[evId].enddate = inp4.value || ''; markDirty(); });
    g4.appendChild(inp4); row1.appendChild(g4);

    editor.appendChild(row1);
    eCard.appendChild(editor);
    sec.appendChild(eCard);

    // Day list
    var dayList = el('div', 'sb-day-list');
    (ev.days || []).forEach(function(day, i) {
      dayList.appendChild(buildSbDay(evId, ev, day, i));
    });
    sec.appendChild(dayList);

    // Add day button
    var addDayBtn = el('button', 'sb-add-btn');
    addDayBtn.innerHTML = '+ Add Day';
    addDayBtn.addEventListener('click', function() {
      var n = (ev.days || []).length + 1;
      if (!ev.days) ev.days = [];
      ev.days.push({
        name: 'Day ' + n, date: '', starttime: '8:00AM', endtime: '4:30PM', games: []
      });
      activeDayIdx = ev.days.length - 1;
      markDirty(); renderAll();
    });
    sec.appendChild(addDayBtn);
    sb.appendChild(sec);
  });

  // Add event button
  var addEvBtn = el('button', 'sb-add-btn');
  addEvBtn.innerHTML = '+ Add Event';
  addEvBtn.style.margin = '8px';
  addEvBtn.addEventListener('click', function() {
    var id = 'event' + Date.now();
    state[id] = { name: 'New Event', base: 'house', startdate: '', enddate: '', days: [] };
    activeEvent = id;
    activeDayIdx = 0;
    markDirty(); renderAll();
  });
  sb.appendChild(addEvBtn);
}

function buildSbDay(evId, ev, day, i) {
  var div = el('div', 'sb-day' + (evId === activeEvent && i === activeDayIdx ? ' active' : ''));
  var nameSpan = el('span');
  nameSpan.textContent = up(day.name || 'Day ' + (i+1));
  nameSpan.style.flex = '1';

  var actions = el('div', 'sb-day-actions');

  var upBtn = iconBtn('↑', 'arrow', function(e) {
    e.stopPropagation();
    if (i === 0) return;
    var arr = ev.days;
    var tmp = arr[i]; arr[i] = arr[i-1]; arr[i-1] = tmp;
    if (activeDayIdx === i) activeDayIdx = i-1;
    else if (activeDayIdx === i-1) activeDayIdx = i;
    markDirty(); renderAll();
  });
  var dnBtn = iconBtn('↓', 'arrow', function(e) {
    e.stopPropagation();
    var arr = ev.days;
    if (i >= arr.length-1) return;
    var tmp = arr[i]; arr[i] = arr[i+1]; arr[i+1] = tmp;
    if (activeDayIdx === i) activeDayIdx = i+1;
    else if (activeDayIdx === i+1) activeDayIdx = i;
    markDirty(); renderAll();
  });
  var delBtn = iconBtn('✕', 'del', function(e) {
    e.stopPropagation();
    if (!confirm('Delete "' + (day.name||'Day') + '"?')) return;
    ev.days.splice(i, 1);
    if (activeDayIdx >= ev.days.length) activeDayIdx = Math.max(0, ev.days.length-1);
    markDirty(); renderAll();
  });

  actions.appendChild(upBtn);
  actions.appendChild(dnBtn);
  actions.appendChild(delBtn);
  div.appendChild(nameSpan);
  div.appendChild(actions);

  div.addEventListener('click', function() {
    activeEvent = evId;
    activeDayIdx = i;
    renderAll();
  });
  return div;
}

// ══════════════════════════════════════════════════════
//  MAIN — DAY EDITOR
// ══════════════════════════════════════════════════════
function renderDay() {
  var main = document.getElementById('main');
  main.innerHTML = '';

  var ev  = state[activeEvent];
  if (!ev) { main.innerHTML = '<div class="empty-state">Select an event.</div>'; return; }
  var day = (ev.days || [])[activeDayIdx];
  if (!day) { main.innerHTML = '<div class="empty-state">No days yet. Add one in the sidebar.</div>'; return; }
  if (!day.games) day.games = [];

  // ── Day header ──
  var hdr = el('div', 'day-header');

  // Name (full width)
  var gName = formGroup('Day Name');
  var inpName = fieldInput(day.name || '', 'text', true);
  inpName.placeholder = 'Day 1';
  inpName.addEventListener('input', function() {
    day.name = inpName.value;
    markDirty(); renderSidebar();
  });
  gName.className += ' day-header-full';
  gName.appendChild(inpName); hdr.appendChild(gName);

  // Date, start, end
  [
    { lbl: 'Date',       key: 'date',      ph: 'May 4, 2026' },
    { lbl: 'Start Time', key: 'starttime', ph: '8:00AM'      },
    { lbl: 'End Time',   key: 'endtime',   ph: '4:30PM'      }
  ].forEach(function(f) {
    var g = formGroup(f.lbl);
    var inp = fieldInput(day[f.key] || '', 'text');
    inp.placeholder = f.ph;
    inp.addEventListener('input', function() { day[f.key] = inp.value; markDirty(); });
    g.appendChild(inp); hdr.appendChild(g);
  });

  main.appendChild(hdr);

  // ── Games list ──
  var secHdr = el('div', 'section-heading');
  var secTitle = el('div', 'section-title');
  secTitle.textContent = 'Games & Breaks — ' + day.games.length + ' items';
  secHdr.appendChild(secTitle);

  // Add buttons
  var addWrap = el('div');
  addWrap.style.display = 'flex'; addWrap.style.gap = '6px';

  var addGameBtn = el('button', 'add-btn');
  addGameBtn.textContent = '+ Game';
  addGameBtn.addEventListener('click', function() {
    day.games.push({
      name:'New Game', modifier:'', time:'',
      delegates:[], isBreak:false,
      scores:false, scorestype:'versus', mid:'', scoring:[]
    });
    markDirty(); renderDay();
    // auto-open last card
    setTimeout(function() {
      var cards = document.querySelectorAll('.card-body');
      if (cards.length) {
        var last = cards[cards.length-1];
        last.classList.add('open');
        var chev = last.previousElementSibling.querySelector('.card-chevron');
        if (chev) chev.classList.add('open');
      }
    }, 50);
  });

  var addBrkBtn = el('button', 'add-btn break');
  addBrkBtn.textContent = '+ Break';
  addBrkBtn.addEventListener('click', function() {
    day.games.push({ name:'Break', modifier:'', time:'', isBreak:true, scores:false });
    markDirty(); renderDay();
  });

  addWrap.appendChild(addGameBtn);
  addWrap.appendChild(addBrkBtn);
  secHdr.appendChild(addWrap);
  main.appendChild(secHdr);

  // Game cards
  day.games.forEach(function(game, gi) {
    main.appendChild(buildGameCard(day, game, gi));
  });
}

// ══════════════════════════════════════════════════════
//  GAME CARD BUILDER
// ══════════════════════════════════════════════════════
function buildGameCard(day, game, gi) {
  var card = el('div', 'game-card' + (game.isBreak ? ' is-break' : ''));

  // ── Bar ──
  var bar = el('div', 'card-bar' + (game.isBreak ? ' is-break' : ''));
  bar.style.cursor = 'pointer';

  var titleSpan = el('div', 'card-bar-title');
  titleSpan.textContent = up(game.name || '');
  var timeSpan = el('div', 'card-time');
  timeSpan.textContent = game.time || '';

  // Tags
  var tagWrap = el('span');
  tagWrap.style.display = 'flex'; tagWrap.style.gap = '4px';
  if (game.isBreak) {
    tagWrap.appendChild(tag('brk','BRK'));
  } else {
    if (game.modifier) tagWrap.appendChild(tag(game.modifier.toLowerCase(), game.modifier.toUpperCase()));
    if (game.scores) {
      tagWrap.appendChild(tag(game.scorestype === 'roundrobin' ? 'rrobin' : 'versus',
        game.scorestype === 'roundrobin' ? 'RR' : 'VS'));
    }
    if (game.mid) tagWrap.appendChild(tag('mid', 'MID ' + game.mid));
  }

  // Order buttons + delete
  var upBtn = iconBtn('↑','arrow', function(e) { e.stopPropagation(); swapGames(day, gi, gi-1); });
  var dnBtn = iconBtn('↓','arrow', function(e) { e.stopPropagation(); swapGames(day, gi, gi+1); });
  var delBtn = iconBtn('✕','del',  function(e) {
    e.stopPropagation();
    if (!confirm('Delete "' + (game.name||'game') + '"?')) return;
    day.games.splice(gi, 1);
    markDirty(); renderDay();
  });

  var chev = el('span', 'card-chevron');
  chev.textContent = '▼';

  bar.appendChild(titleSpan);
  bar.appendChild(timeSpan);
  bar.appendChild(tagWrap);
  bar.appendChild(upBtn);
  bar.appendChild(dnBtn);
  bar.appendChild(delBtn);
  bar.appendChild(chev);

  // ── Body ──
  var body = el('div', 'card-body');

  // Toggle expand
  bar.addEventListener('click', function(e) {
    if (e.target.closest('.icon-btn')) return;
    body.classList.toggle('open');
    chev.classList.toggle('open');
  });

  // ── Row 1: name, time, modifier ──
  var row1 = el('div', 'form-row');

  var gName = formGroup('Game Name');
  var inpName = fieldInput(game.name || '', 'text', true);
  inpName.placeholder = 'Basketball';
  inpName.addEventListener('input', function() {
    game.name = inpName.value;
    titleSpan.textContent = up(inpName.value);
    markDirty();
  });
  gName.appendChild(inpName); row1.appendChild(gName);

  var gTime = formGroup('Time');
  var inpTime = fieldInput(game.time || '', 'text');
  inpTime.placeholder = '9:00AM';
  inpTime.addEventListener('input', function() {
    game.time = inpTime.value;
    timeSpan.textContent = inpTime.value;
    markDirty();
  });
  gTime.appendChild(inpTime); row1.appendChild(gTime);

  if (!game.isBreak) {
    var gMod = formGroup('Modifier');
    var selMod = document.createElement('select');
    selMod.className = 'field-input';
    [['','None'],['junior','Junior'],['senior','Senior']].forEach(function(o) {
      var opt = document.createElement('option');
      opt.value = o[0]; opt.textContent = o[1];
      if (game.modifier === o[0]) opt.selected = true;
      selMod.appendChild(opt);
    });
    selMod.addEventListener('change', function() {
      game.modifier = selMod.value;
      refreshTags(tagWrap, game);
      markDirty();
    });
    gMod.appendChild(selMod); row1.appendChild(gMod);
  }

  body.appendChild(row1);

  // ── Is Break toggle ──
  var tRow = el('div', 'toggle-row');
  var breakWrap = toggleWrap('Break / Filler', game.isBreak, function(v) {
    game.isBreak = v;
    card.classList.toggle('is-break', v);
    bar.classList.toggle('is-break', v);
    refreshTags(tagWrap, game);
    markDirty();
    // Re-render this card for full accuracy
    var fresh = buildGameCard(day, game, gi);
    card.replaceWith(fresh);
  });
  tRow.appendChild(breakWrap);

  if (!game.isBreak) {
    // Scores toggle
    var scoresWrap = toggleWrap('Scores', !!game.scores, function(v) {
      game.scores = v;
      refreshTags(tagWrap, game);
      markDirty();
      // Re-render
      var fresh = buildGameCard(day, game, gi);
      card.replaceWith(fresh);
    });
    tRow.appendChild(scoresWrap);
  }

  body.appendChild(tRow);

  if (!game.isBreak) {
    // ── Delegates ──
    var gDel = formGroup('Delegates');
    body.appendChild(gDel);
    gDel.appendChild(buildDelegatesInput(game));

    // ── MID ──
    if (game.scores) {
      var row2 = el('div', 'form-row');
      var gMid = formGroup('Match ID (MID)');
      var inpMid = fieldInput(game.mid || '', 'text');
      inpMid.placeholder = '001';
      inpMid.addEventListener('input', function() {
        game.mid = inpMid.value;
        refreshTags(tagWrap, game);
        markDirty();
      });
      gMid.appendChild(inpMid); row2.appendChild(gMid);
      body.appendChild(row2);

      // ── Score type ──
      var gST = formGroup('Score Type');
      var stPicker = el('div', 'scoretype-picker');
      ['versus','roundrobin'].forEach(function(t) {
        var opt = el('div', 'scoretype-opt' + (game.scorestype === t ? ' active' : ''));
        opt.textContent = t === 'versus' ? 'Versus' : 'Round Robin';
        opt.addEventListener('click', function() {
          game.scorestype = t;
          stPicker.querySelectorAll('.scoretype-opt').forEach(function(o) { o.classList.remove('active'); });
          opt.classList.add('active');
          refreshTags(tagWrap, game);
          markDirty();
          // Re-render scoring section
          var fresh = buildGameCard(day, game, gi);
          card.replaceWith(fresh);
          // Re-open body
          var freshBody = fresh.querySelector('.card-body');
          var freshChev = fresh.querySelector('.card-chevron');
          if (freshBody) freshBody.classList.add('open');
          if (freshChev) freshChev.classList.add('open');
        });
        stPicker.appendChild(opt);
      });
      gST.appendChild(stPicker);
      body.appendChild(gST);

      // ── Scoring rows (versus only) ──
      if (game.scorestype === 'versus') {
        body.appendChild(buildScoringEditor(game, tagWrap));
      } else {
        body.appendChild(buildRREditor(game, tagWrap));
      }
    }
  }

  card.appendChild(bar);
  card.appendChild(body);
  return card;
}

// ══════════════════════════════════════════════════════
//  SCORING EDITOR (versus rows)
// ══════════════════════════════════════════════════════
function buildScoringEditor(game, tagWrap) {
  var wrap = el('div');
  var lbl  = el('div', 'field-label');
  lbl.textContent = 'Scoring Rows (Houses / Teams)';
  wrap.appendChild(lbl);

  var table = el('div', 'scoring-table');
  if (!game.scoring) game.scoring = [];

  function renderRows() {
    table.innerHTML = '';
    game.scoring.forEach(function(row, ri) {
      var sRow = el('div', 'scoring-row');

      var num = el('div', 'sr-num');
      num.textContent = ri + 1;

      // Team A
      var inpA = document.createElement('input');
      inpA.className = 'sr-input';
      inpA.value = row.teamA || '';
      inpA.placeholder = 'BLUE';
      inpA.addEventListener('input', function() { row.teamA = inpA.value; markDirty(); });

      var scoreA = document.createElement('input');
      scoreA.className = 'sr-input sr-score';
      scoreA.type = 'number'; scoreA.min = 0;
      scoreA.value = row.scoreA != null ? row.scoreA : 0;
      scoreA.addEventListener('input', function() { row.scoreA = parseInt(scoreA.value,10)||0; markDirty(); });

      var vs = el('div', 'sr-vs');
      vs.textContent = 'VS';

      var scoreB = document.createElement('input');
      scoreB.className = 'sr-input sr-score';
      scoreB.type = 'number'; scoreB.min = 0;
      scoreB.value = row.scoreB != null ? row.scoreB : 0;
      scoreB.addEventListener('input', function() { row.scoreB = parseInt(scoreB.value,10)||0; markDirty(); });

      var inpB = document.createElement('input');
      inpB.className = 'sr-input';
      inpB.value = row.teamB || '';
      inpB.placeholder = 'GREEN';
      inpB.addEventListener('input', function() { row.teamB = inpB.value; markDirty(); });

      var delR = iconBtn('✕', 'del', function() {
        game.scoring.splice(ri, 1);
        markDirty(); renderRows();
      });

      sRow.appendChild(num);
      sRow.appendChild(inpA);
      sRow.appendChild(scoreA);
      sRow.appendChild(vs);
      sRow.appendChild(scoreB);
      sRow.appendChild(inpB);
      sRow.appendChild(delR);
      table.appendChild(sRow);
    });

    var addR = el('button', 'scoring-add');
    addR.textContent = '+ Add House / Team Row';
    addR.addEventListener('click', function() {
      game.scoring.push({ teamA:'', scoreA:0, teamB:'', scoreB:0 });
      markDirty(); renderRows();
    });
    table.appendChild(addR);
  }

  renderRows();
  wrap.appendChild(table);
  return wrap;
}

// ══════════════════════════════════════════════════════
//  DELEGATES INPUT (tag style)
// ══════════════════════════════════════════════════════
function buildDelegatesInput(game) {
  if (!game.delegates) game.delegates = [];

  var wrap = el('div', 'delegates-wrap');

  function refreshTags() {
    wrap.querySelectorAll('.delegate-tag').forEach(function(t) { t.remove(); });
    var inp = wrap.querySelector('.delegate-input');
    game.delegates.forEach(function(name, di) {
      var t = el('div', 'delegate-tag');
      t.innerHTML = '';
      var span = document.createElement('span');
      span.textContent = name;
      var btn = document.createElement('button');
      btn.textContent = '×';
      btn.title = 'Remove';
      btn.addEventListener('click', function() {
        game.delegates.splice(di, 1);
        markDirty(); refreshTags();
      });
      t.appendChild(span);
      t.appendChild(btn);
      wrap.insertBefore(t, inp);
    });
  }

  var inp = el('input', 'delegate-input');
  inp.placeholder = 'Type name, press Enter…';
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      var v = inp.value.trim().replace(/,$/, '');
      if (v) {
        game.delegates.push(v);
        inp.value = '';
        markDirty(); refreshTags();
      }
    } else if (e.key === 'Backspace' && inp.value === '' && game.delegates.length) {
      game.delegates.pop();
      markDirty(); refreshTags();
    }
  });
  inp.addEventListener('blur', function() {
    var v = inp.value.trim().replace(/,$/, '');
    if (v) { game.delegates.push(v); inp.value = ''; markDirty(); refreshTags(); }
  });

  wrap.appendChild(inp);
  refreshTags();
  wrap.addEventListener('click', function() { inp.focus(); });
  return wrap;
}

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════
function el(tag, cls) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function up(s) { return (s||'').toUpperCase(); }

function baseLabel(b) {
  return b === 'grade' ? 'GRADE BASED' : 'HOUSE BASED';
}

function formGroup(label) {
  var g = el('div', 'form-group');
  var l = el('div', 'field-label');
  l.textContent = label;
  g.appendChild(l);
  return g;
}

function fieldInput(val, type, isBig) {
  var inp = document.createElement('input');
  inp.className = 'field-input' + (isBig ? ' title-input' : '');
  inp.type = type || 'text';
  inp.value = val || '';
  return inp;
}

function iconBtn(symbol, extraCls, fn) {
  var b = el('button', 'icon-btn ' + (extraCls||''));
  b.textContent = symbol;
  b.addEventListener('click', fn);
  return b;
}

function tag(cls, text) {
  var t = el('span', 'ctag ' + cls);
  t.textContent = text;
  return t;
}

function toggleWrap(label, initialOn, onChange) {
  var wrap = el('div', 'toggle-wrap');
  var toggle = el('button', 'toggle' + (initialOn ? ' on' : ''));
  toggle.type = 'button';
  var lbl = el('span', 'toggle-text');
  lbl.textContent = label;
  toggle.addEventListener('click', function() {
    var nowOn = !toggle.classList.contains('on');
    toggle.classList.toggle('on', nowOn);
    onChange(nowOn);
  });
  wrap.appendChild(toggle);
  wrap.appendChild(lbl);
  return wrap;
}

function swapGames(day, a, b) {
  var arr = day.games;
  if (b < 0 || b >= arr.length) return;
  var tmp = arr[a]; arr[a] = arr[b]; arr[b] = tmp;
  markDirty(); renderDay();
}

function refreshTags(tagWrap, game) {
  tagWrap.innerHTML = '';
  if (game.isBreak) {
    tagWrap.appendChild(tag('brk','BRK'));
  } else {
    if (game.modifier) tagWrap.appendChild(tag(game.modifier.toLowerCase(), game.modifier.toUpperCase()));
    if (game.scores) {
      tagWrap.appendChild(tag(game.scorestype === 'roundrobin' ? 'rrobin' : 'versus',
        game.scorestype === 'roundrobin' ? 'RR' : 'VS'));
    }
    if (game.mid) tagWrap.appendChild(tag('mid', 'MID ' + game.mid));
  }
}

// ══════════════════════════════════════════════════════
//  ROUND ROBIN EDITOR
//  scoring = [{teamA, scoreA, teamB, scoreB}, ...]
//  Same shape as versus. null scores = pending/not played yet.
// ══════════════════════════════════════════════════════
function buildRREditor(game, tagWrap) {
  var wrap = el('div');

  if (!Array.isArray(game.scoring)) game.scoring = [];

  // ── Auto-generate helper ──
  var genWrap = el('div');
  genWrap.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;';

  var genInput = document.createElement('input');
  genInput.className = 'field-input';
  genInput.style.flex = '1';
  genInput.style.minWidth = '160px';
  genInput.placeholder = 'GREEN, BLUE, RED, BLACK';
  genInput.title = 'Comma-separated house names — generates all pairings';

  var genBtn = el('button', 'add-btn');
  genBtn.style.cssText = 'white-space:nowrap;flex-shrink:0;border-color:var(--accent);color:var(--accent);';
  genBtn.textContent = '⚡ Generate all pairings';
  genBtn.addEventListener('click', function() {
    var names = genInput.value.split(',').map(function(s) { return s.trim().toUpperCase(); }).filter(Boolean);
    if (names.length < 2) return;
    var pairs = [];
    for (var i = 0; i < names.length; i++) {
      for (var j = i + 1; j < names.length; j++) {
        pairs.push({ teamA: names[i], scoreA: null, teamB: names[j], scoreB: null });
      }
    }
    game.scoring = pairs;
    markDirty(); renderRows();
  });

  var genNote = el('div');
  genNote.style.cssText = 'font-size:.7rem;color:var(--text3);width:100%;margin-top:-4px;';
  genNote.textContent = '4 houses → 6 matchups auto-generated. Leave scores blank for unplayed matches.';

  genWrap.appendChild(genInput);
  genWrap.appendChild(genBtn);
  genWrap.appendChild(genNote);
  wrap.appendChild(genWrap);

  var lbl = el('div', 'field-label');
  lbl.textContent = 'Matchups';
  wrap.appendChild(lbl);

  var table = el('div', 'scoring-table');

  function renderRows() {
    table.innerHTML = '';
    game.scoring.forEach(function(match, ri) {
      var sRow = el('div', 'scoring-row');

      var num = el('div', 'sr-num');
      num.textContent = ri + 1;

      var inpA = document.createElement('input');
      inpA.className = 'sr-input';
      inpA.value = match.teamA || '';
      inpA.placeholder = 'GREEN';
      inpA.addEventListener('input', function() { match.teamA = inpA.value.toUpperCase(); markDirty(); });

      var scoreA = document.createElement('input');
      scoreA.className = 'sr-input sr-score';
      scoreA.type = 'number'; scoreA.min = 0;
      scoreA.value = match.scoreA != null ? match.scoreA : '';
      scoreA.placeholder = '—';
      scoreA.addEventListener('input', function() {
        match.scoreA = scoreA.value !== '' ? parseInt(scoreA.value, 10) : null;
        markDirty();
      });

      var colon = el('div', 'sr-vs');
      colon.textContent = ':';

      var scoreB = document.createElement('input');
      scoreB.className = 'sr-input sr-score';
      scoreB.type = 'number'; scoreB.min = 0;
      scoreB.value = match.scoreB != null ? match.scoreB : '';
      scoreB.placeholder = '—';
      scoreB.addEventListener('input', function() {
        match.scoreB = scoreB.value !== '' ? parseInt(scoreB.value, 10) : null;
        markDirty();
      });

      var inpB = document.createElement('input');
      inpB.className = 'sr-input';
      inpB.value = match.teamB || '';
      inpB.placeholder = 'BLUE';
      inpB.style.textAlign = 'right';
      inpB.addEventListener('input', function() { match.teamB = inpB.value.toUpperCase(); markDirty(); });

      var delR = iconBtn('✕', 'del', function() {
        game.scoring.splice(ri, 1);
        markDirty(); renderRows();
      });

      sRow.appendChild(num);
      sRow.appendChild(inpA);
      sRow.appendChild(scoreA);
      sRow.appendChild(colon);
      sRow.appendChild(scoreB);
      sRow.appendChild(inpB);
      sRow.appendChild(delR);
      table.appendChild(sRow);
    });

    var addR = el('button', 'scoring-add');
    addR.textContent = '+ Add Matchup';
    addR.addEventListener('click', function() {
      game.scoring.push({ teamA: '', scoreA: null, teamB: '', scoreB: null });
      markDirty(); renderRows();
    });
    table.appendChild(addR);
  }

  renderRows();
  wrap.appendChild(table);
  return wrap;
}
